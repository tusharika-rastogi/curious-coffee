name: Update Coffee Cards

on:
  schedule:
    # 6pm EST = 23:00 UTC (EST is UTC-5)
    - cron: "0 23 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Run coffee card updater
        run: python3 update_coffees.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated cards
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update coffee cards [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: No changes found
        if: steps.diff.outputs.changed == 'false'
        run: echo "Coffee cards are already up to date. No commit needed."
