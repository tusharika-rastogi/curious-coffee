name: Update Reviews

on:
  schedule:
    # 8pm EST = 01:00 UTC Saturday (EST is UTC-5)
    - cron: "0 1 * * 6"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run reviews updater
        run: python3 update_reviews.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated reviews
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update reviews [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: No changes found
        if: steps.diff.outputs.changed == 'false'
        run: echo "Reviews are already up to date. No commit needed."
